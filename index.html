<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify Manufacturer Details | Satara Spices</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f6f6;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 420px;
      margin: 40px auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .brand {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: #8b0000;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 18px;
      text-align: center;
      margin-bottom: 18px;
      color: #222;
    }

    label {
      font-size: 14px;
      display: block;
      margin-bottom: 6px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 12px;
      text-transform: uppercase;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #8b0000;
      color: #ffffff;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #6f0000;
    }

    .result {
      margin-top: 20px;
      font-size: 14px;
      line-height: 1.6;
      display: none;
      color: #111;
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #666;
      text-align: center;
      border-top: 1px solid #eee;
      padding-top: 12px;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="brand">Satara Spices</div>
    <div class="subtitle">Premium Quality Spices</div>

    <h1>Verify Manufacturer Details</h1>

    <label for="batch">Enter full Batch No.</label>
    <input type="text" id="batch" placeholder="e.g. SPS01123456" />

    <button onclick="showDetails()">View Details</button>

    <div class="result" id="result"></div>

    <div class="footer">
      Packed for Bluexim (Satara Spices)<br/>
      Country of Origin: India<br/>
      For queries: Call or Whatsapp +91 9769455099
    </div>

  </div>

  <script>
    function showDetails() {
      const batchValue = document.getElementById("batch").value.toUpperCase();
      const resultDiv = document.getElementById("result");

      if (batchValue.includes("SPS")) {
        resultDiv.style.display = "block";
        resultDiv.innerHTML = `
          <strong>Manufactured by:</strong><br>
          Navnath Spices Pvt. Ltd.<br><br>

          <strong>Manufacturing Address:</strong><br>
          Plot No. M-1, MIDC Avdhan, Dhule - 424001<br><br>

          <strong>FSSAI License No:</strong><br>
          10018022007595<br><br>

          <strong>Lab Test Report:</strong><br>
Kindly email us with batch number and product name at 
<a href="mailto:info@sataraspices.com">info@sataraspices.com</a> to receive the lab test report.
        `;
      } else {
        resultDiv.style.display = "block";
        resultDiv.innerHTML =
          "Manufacturer details not found for this batch number.";
      }
    }
  </script>

</body>
</html>
